name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update Info.plist version
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.version }}" Resources/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.run_number }}" Resources/Info.plist

      - name: Build app bundle
        run: |
          chmod +x scripts/build-app.sh
          scripts/build-app.sh

      - name: Create DMG
        run: |
          DMG_NAME="Dahlia-${{ steps.version.outputs.version }}.dmg"
          DMG_TEMP="dmg-staging"
          mkdir -p "$DMG_TEMP"
          cp -R Dahlia.app "$DMG_TEMP/"
          ln -s /Applications "$DMG_TEMP/Applications"
          hdiutil create -volname "Dahlia" \
            -srcfolder "$DMG_TEMP" \
            -ov -format UDZO \
            "$DMG_NAME"
          rm -rf "$DMG_TEMP"
          echo "DMG_NAME=$DMG_NAME" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DMG_NAME }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
